apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-logger-backend
  namespace: llm-inference-logger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-logger-backend
  template:
    metadata:
      labels:
        app: llm-logger-backend
    spec:
      containers:
        - name: backend
          image: llm-logger-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-logger-config
            - secretRef:
                name: llm-logger-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-logger-backend
  namespace: llm-inference-logger
spec:
  selector:
    app: llm-logger-backend
  ports:
    - port: 8000
      targetPort: 8000
