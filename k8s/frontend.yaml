apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-logger-frontend
  namespace: llm-inference-logger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-logger-frontend
  template:
    metadata:
      labels:
        app: llm-logger-frontend
    spec:
      containers:
        - name: frontend
          image: llm-logger-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: llm-logger-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: llm-logger-frontend
  namespace: llm-inference-logger
spec:
  type: LoadBalancer
  selector:
    app: llm-logger-frontend
  ports:
    - port: 3000
      targetPort: 3000
