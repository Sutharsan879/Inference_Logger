services:
  mongodb:
    image: mongo:7
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}); quit(0) }"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: mongodb://mongodb:27017/inference_logs?replicaSet=rs0
      CORS_ORIGINS: http://localhost:3000
      MOCK_LLM: 'true'
      INGESTION_MODE: queue
      PORT: 8000
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
